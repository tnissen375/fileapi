services:
  xml-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: xml-server:latest
    container_name: xml-server
    ports:
      - "8080:80"
    volumes:
      # Portainer: XML-Dateien vom Host/Volume dynamisch einbinden
      # Änderungen an Dateien im gemounteten Pfad werden sofort ausgeliefert
      - ./data:/usr/share/nginx/html:ro
    restart: unless-stopped
